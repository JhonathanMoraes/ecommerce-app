<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Produtos | ECommerce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="bg-dark text-white py-4 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h1 class="fw-bold fs-3 mb-0"><i class="bi bi-box me-2"></i>Meus Produtos</h1>
        </div>
        <a th:href="@{/produtos/novo}" class="btn btn-light fw-semibold">
            <i class="bi bi-plus-circle me-2"></i>Novo Produto
        </a>
    </div>
</div>

<div class="container py-4">

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show d-flex align-items-center">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(produtos)}" class="text-center py-5">
        <i class="bi bi-box text-muted" style="font-size: 4rem;"></i>
        <h4 class="text-muted mt-3">Você ainda não anunciou nenhum produto</h4>
        <a th:href="@{/produtos/novo}" class="btn btn-primary mt-3">
            <i class="bi bi-plus-circle me-2"></i>Criar meu primeiro produto
        </a>
    </div>

    <div class="card shadow-sm border-0" th:unless="${#lists.isEmpty(produtos)}">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="py-3 ps-4">Nome</th>
                        <th class="py-3">Quantidade</th>
                        <th class="py-3">Preço</th>
                        <th class="py-3">Nota</th>
                        <th class="py-3 text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="produto : ${produtos}"
                        th:onclick="|window.location.href='@{/produtos/editar/{id}(id=${produto.id})}'|">
                        <td class="py-3 ps-4 fw-semibold" th:text="${produto.nome}">Produto</td>
                        <td class="py-3" th:text="${produto.quantidade}">0</td>
                        <td class="py-3 text-primary fw-bold">
                            R$ <span th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">0,00</span>
                        </td>
                        <td class="py-3">
                            <span class="badge bg-warning text-dark">
                                <i class="bi bi-star-fill me-1"></i>
                                <span th:text="${produto.nota}">0</span>/10
                            </span>
                        </td>
                        <td class="py-3 text-center">
                            <a th:href="@{/produtos/editar/{id}(id=${produto.id})}"
                               class="btn btn-sm btn-outline-primary me-1"
                               onclick="event.stopPropagation()" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/produtos/desativar/{id}(id=${produto.id})}" method="post"
                                  class="d-inline" onclick="event.stopPropagation()">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Deseja desativar este produto?')" title="Desativar">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
