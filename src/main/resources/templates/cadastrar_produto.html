<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${produtoDTO.id != 0} ? 'Editar Produto | ECommerce' : 'Novo Produto | ECommerce'">Produto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="bg-dark text-white py-4 mb-4">
    <div class="container">
        <h1 class="fw-bold fs-3 mb-0">
            <i class="bi bi-box me-2"></i>
            <span th:text="${produtoDTO.id != 0} ? 'Editar Produto' : 'Anunciar Novo Produto'">Produto</span>
        </h1>
    </div>
</div>

<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/produtos/meus}" class="text-decoration-none">Meus Produtos</a></li>
            <li class="breadcrumb-item active" th:text="${produtoDTO.id != 0} ? 'Editar' : 'Novo'">Novo</li>
        </ol>
    </nav>

    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${erro}"></span>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm border-0 p-4">
                <!-- Criar novo produto -->
                <form th:if="${produtoDTO.id == 0}"
                      th:action="@{/produtos/salvar}" th:object="${produtoDTO}" method="post">
                    <input type="hidden" th:field="*{usuario}">

                    <div class="mb-3">
                        <label for="nome" class="form-label fw-semibold">Nome do Produto</label>
                        <input type="text" id="nome" th:field="*{nome}" class="form-control"
                               placeholder="Ex: Fone de ouvido bluetooth" required>
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label fw-semibold">Descrição</label>
                        <textarea id="descricao" th:field="*{descricao}" class="form-control" rows="4"
                                  placeholder="Descreva seu produto..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Categorias</label>
                        <div class="d-flex gap-2 mb-2">
                            <select id="selectCategorias" class="form-select">
                                <option value="">-- Selecione uma categoria --</option>
                                <option th:each="cat : ${todasCategorias}" th:value="${cat.id}" th:text="${cat.nome}"></option>
                            </select>
                            <button type="button" id="btnAdicionarCategoria" class="btn btn-primary">Adicionar</button>
                        </div>
                        <ul id="listaCategoriasSelecionadas" class="list-group mb-2">
                            <li class="list-group-item d-flex justify-content-between align-items-center" 
                                th:each="catId : *{categorias}" 
                                th:data-id="${catId}">
                                <span th:each="cat : ${todasCategorias}" th:if="${cat.id == catId}" th:text="${cat.nome}">Categoria</span>
                                <button type="button" class="btn btn-sm btn-danger btn-remover-categoria"><i class="bi bi-trash"></i></button>
                            </li>
                        </ul>
                        <div id="containerCategoriasHidden">
                            <input type="hidden" name="categorias" th:each="catId : *{categorias}" th:value="${catId}">
                        </div>
                    </div>



                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="quantidade" class="form-label fw-semibold">Quantidade em estoque</label>
                            <input type="number" id="quantidade" th:field="*{quantidade}" class="form-control"
                                   min="1" placeholder="0" required>
                        </div>
                        <div class="col-md-6">
                            <label for="preco" class="form-label fw-semibold">Preço unitário (R$)</label>
                            <div class="input-group">
                                <span class="input-group-text">R$</span>
                                <input type="number" id="preco" th:field="*{preco}" class="form-control"
                                       min="0" step="0.01" placeholder="0,00" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success text-white fw-semibold px-4">
                            <i class="bi bi-cloud-upload me-2"></i>Publicar Produto
                        </button>
                        <a th:href="@{/produtos/meus}" class="btn btn-outline-secondary px-4">Cancelar</a>
                    </div>
                </form>

                <!-- Editar produto existente -->
                <form th:if="${produtoDTO.id != 0}"
                      th:action="@{/produtos/atualizar/{id}(id=${produtoDTO.id})}" th:object="${produtoDTO}" method="post">

                    <div class="mb-3">
                        <label for="nomeEdit" class="form-label fw-semibold">Nome do Produto</label>
                        <input type="text" id="nomeEdit" th:field="*{nome}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="descricaoEdit" class="form-label fw-semibold">Descrição</label>
                        <textarea id="descricaoEdit" th:field="*{descricao}" class="form-control" rows="4"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Categorias</label>
                        <div class="d-flex gap-2 mb-2">
                            <select id="selectCategoriasEdit" class="form-select">
                                <option value="">-- Selecione uma categoria --</option>
                                <option th:each="cat : ${todasCategorias}" th:value="${cat.id}" th:text="${cat.nome}"></option>
                            </select>
                            <button type="button" id="btnAdicionarCategoriaEdit" class="btn btn-primary">Adicionar</button>
                        </div>
                        <ul id="listaCategoriasSelecionadasEdit" class="list-group mb-2">
                            <li class="list-group-item d-flex justify-content-between align-items-center" 
                                th:each="catId : *{categorias}" 
                                th:data-id="${catId}">
                                <span th:each="cat : ${todasCategorias}" th:if="${cat.id == catId}" th:text="${cat.nome}">Categoria</span>
                                <button type="button" class="btn btn-sm btn-danger btn-remover-categoria"><i class="bi bi-trash"></i></button>
                            </li>
                        </ul>
                        <div id="containerCategoriasHiddenEdit">
                            <input type="hidden" name="categorias" th:each="catId : *{categorias}" th:value="${catId}">
                        </div>
                    </div>



                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="quantidadeEdit" class="form-label fw-semibold">Quantidade em estoque</label>
                            <input type="number" id="quantidadeEdit" th:field="*{quantidade}" class="form-control" min="0" required>
                        </div>
                        <div class="col-md-6">
                            <label for="precoEdit" class="form-label fw-semibold">Preço unitário (R$)</label>
                            <div class="input-group">
                                <span class="input-group-text">R$</span>
                                <input type="number" id="precoEdit" th:field="*{preco}" class="form-control"
                                       min="0" step="0.01" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success text-white fw-semibold px-4">
                            <i class="bi bi-check-circle me-2"></i>Salvar Alterações
                        </button>
                        <a th:href="@{/produtos/meus}" class="btn btn-outline-secondary px-4">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    configurarAdicaoCategorias("selectCategorias", "btnAdicionarCategoria", "listaCategoriasSelecionadas", "containerCategoriasHidden");
    configurarAdicaoCategorias("selectCategoriasEdit", "btnAdicionarCategoriaEdit", "listaCategoriasSelecionadasEdit", "containerCategoriasHiddenEdit");

    function configurarAdicaoCategorias(selectId, btnId, listId, containerId) {
        const select = document.getElementById(selectId);
        const btnAdd = document.getElementById(btnId);
        const list = document.getElementById(listId);
        const hiddenContainer = document.getElementById(containerId);

        if (!select || !btnAdd || !list || !hiddenContainer) return;

        function atualizarInputsHidden() {
            hiddenContainer.innerHTML = "";
            const items = list.querySelectorAll("li");
            items.forEach(item => {
                const id = item.getAttribute("data-id");
                const input = document.createElement("input");
                input.type = "hidden";
                input.name = "categorias";
                input.value = id;
                hiddenContainer.appendChild(input);
            });
        }

        btnAdd.addEventListener("click", function () {
            const id = select.value;
            const name = select.options[select.selectedIndex].text;

            if (!id) return;

            if (list.querySelector(`li[data-id="${id}"]`)) {
                alert("Esta categoria já foi adicionada.");
                return;
            }

            const li = document.createElement("li");
            li.className = "list-group-item d-flex justify-content-between align-items-center";
            li.setAttribute("data-id", id);
            li.innerHTML = `
                <span>${name}</span>
                <button type="button" class="btn btn-sm btn-danger btn-remover-categoria"><i class="bi bi-trash"></i></button>
            `;
            list.appendChild(li);

            atualizarInputsHidden();
            select.value = "";
        });

        list.addEventListener("click", function (e) {
            if (e.target.classList.contains("btn-remover-categoria") || e.target.closest(".btn-remover-categoria")) {
                const btn = e.target.classList.contains("btn-remover-categoria") ? e.target : e.target.closest(".btn-remover-categoria");
                const li = btn.closest("li");
                li.remove();
                atualizarInputsHidden();
            }
        });
    }
});
</script>
</body>
</html>
