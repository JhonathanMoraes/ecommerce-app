<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Pedido | ECommerce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="bg-dark text-white py-4 mb-4">
    <div class="container">
        <h1 class="fw-bold fs-3 mb-0">
            <i class="bi bi-receipt me-2"></i>Pedido #<span th:text="${pedido.id}">0</span>
        </h1>
    </div>
</div>

<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/pedidos}" class="text-decoration-none">Meus Pedidos</a></li>
            <li class="breadcrumb-item active">Pedido #<span th:text="${pedido.id}">0</span></li>
        </ol>
    </nav>

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show d-flex align-items-center">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 p-4">
                <h5 class="fw-bold mb-3"><i class="bi bi-info-circle me-2 text-primary"></i>Informações do Pedido</h5>

                <div class="d-flex justify-content-between align-items-center border-bottom py-2">
                    <span class="text-muted fw-semibold"><i class="bi bi-box me-2"></i>Produto</span>
                    <span class="info-value" th:text="${pedido.nomeProduto}">Produto</span>
                </div>
                <div class="d-flex justify-content-between align-items-center border-bottom py-2">
                    <span class="text-muted fw-semibold"><i class="bi bi-123 me-2"></i>Quantidade</span>
                    <span class="info-value" th:text="${pedido.quantidade}">1</span>
                </div>
                <div class="d-flex justify-content-between align-items-center border-bottom py-2">
                    <span class="text-muted fw-semibold"><i class="bi bi-flag me-2"></i>Status</span>
                    <span th:text="${pedido.status}"
                          th:classappend="${pedido.status == 'PENDENTE'} ? 'bg-warning text-dark' :
                                          (${pedido.status == 'CANCELADO'} ? 'bg-danger' :
                                          (${pedido.status == 'ENVIADO'} ? 'bg-success' : 'bg-info'))"
                          class="badge rounded-pill fs-6">PENDENTE</span>
                </div>
                <div class="d-flex justify-content-between align-items-center border-bottom py-2">
                    <span class="text-muted fw-semibold"><i class="bi bi-credit-card me-2"></i>Tipo de Pagamento</span>
                    <span class="info-value" th:text="${pedido.tipoDePagamento}">PIX</span>
                </div>
                <div class="d-flex justify-content-between align-items-center border-bottom py-2">
                    <span class="text-muted fw-semibold"><i class="bi bi-geo-alt me-2"></i>Endereço de Entrega</span>
                    <span class="info-value" th:text="${pedido.endereco}">Endereço</span>
                </div>
                <div class="d-flex justify-content-between align-items-center border-bottom py-2">
                    <span class="text-muted fw-semibold"><i class="bi bi-truck me-2"></i>Frete</span>
                    <span class="info-value">
                        R$ <span th:text="${#numbers.formatDecimal(pedido.frete, 1, 'POINT', 2, 'COMMA')}">0,00</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="bg-dark text-white rounded-3 p-4 text-center mb-3">
                <div class="text-white-50 small mb-1">Total do Pedido</div>
                <div class="fw-bold fs-2">
                    R$ <span th:text="${#numbers.formatDecimal(pedido.total, 1, 'POINT', 2, 'COMMA')}">0,00</span>
                </div>
            </div>

            <div class="card shadow-sm border-0 p-3">
                <form th:action="@{/pedidos/status/{id}(id=${pedido.id})}" method="post"
                      th:if="${pedido.status != 'ENVIADO' and pedido.status != 'CANCELADO'}">
                    <input type="hidden" name="status" value="ENVIADO">
                    <div class="d-grid mb-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-box-seam me-2"></i>Confirmar Entrega
                        </button>
                    </div>
                </form>
                <form th:action="@{/pedidos/cancelar/{id}(id=${pedido.id})}" method="post"
                      th:if="${pedido.status == 'PENDENTE'}">
                    <div class="d-grid mb-2">
                        <button type="submit" class="btn btn-outline-danger">
                            <i class="bi bi-x-circle me-2"></i>Cancelar Pedido
                        </button>
                    </div>
                </form>
                <a th:href="@{/pedidos}" class="btn btn-outline-secondary w-100 mt-2">
                    <i class="bi bi-arrow-left me-2"></i>Voltar aos Pedidos
                </a>
            </div>

            <div class="card shadow-sm border-0 p-3 mt-3" th:if="${pedido.status == 'ENVIADO'}">
                <h6 class="fw-bold mb-3"><i class="bi bi-star-fill me-2 text-warning"></i>Avaliar Produto</h6>
                
                <div th:if="${pedido.nota != null}">
                    <p class="mb-0 small text-muted">Sua avaliação: <span class="badge bg-warning text-dark fs-6 ms-1" th:text="${pedido.nota} + '/10'"></span></p>
                </div>

                <form th:action="@{/pedidos/avaliar/{id}(id=${pedido.id})}" method="post" th:if="${pedido.nota == null}">
                    <div class="mb-2">
                        <label for="nota" class="form-label small">Dê uma nota de 0 a 10</label>
                        <input type="number" id="nota" name="nota" class="form-control" min="0" max="10" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning text-dark fw-semibold">
                            Enviar Avaliação
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
