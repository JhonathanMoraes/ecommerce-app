<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Categoria | ECommerce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="bg-dark text-white py-4 mb-4">
    <div class="container">
        <h1 class="fw-bold fs-3 mb-0">
            <i class="bi bi-tags me-2"></i>
            <span>Nova Categoria</span>
        </h1>
    </div>
</div>

<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Nova Categoria</li>
        </ol>
    </nav>

    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center mb-4">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${erro}"></span>
    </div>

    <div th:if="${sucesso}" class="alert alert-success d-flex align-items-center mb-4">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${sucesso}"></span>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0 p-4">
                <form th:action="@{/categorias/salvar}" th:object="${categoriaDTO}" method="post">
                    <div class="mb-4">
                        <label for="nome" class="form-label fw-semibold">Nome da Categoria</label>
                        <input type="text" id="nome" th:field="*{nome}" class="form-control form-control-lg"
                               placeholder="Ex: Vestuário, Livros, Tecnologia" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-semibold px-4">
                            <i class="bi bi-plus-circle me-2"></i>Cadastrar Categoria
                        </button>
                        <a th:href="@{/}" class="btn btn-outline-secondary btn-lg px-4">Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
