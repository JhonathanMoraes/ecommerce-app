<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil | ECommerce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="bg-dark text-white py-4 mb-4">
    <div class="container">
        <h1 class="fw-bold fs-3 mb-0"><i class="bi bi-person-gear me-2"></i>Editar Perfil</h1>
        <p class="text-white-50 mb-0 small">Atualize suas informações de conta</p>
    </div>
</div>

<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Home</a></li>
            <li class="breadcrumb-item active">Editar Perfil</li>
        </ol>
    </nav>

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show d-flex align-items-center">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow-sm border-0 p-4">
                <div class="text-center mb-4">
                    <div class="bg-secondary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                        <i class="bi bi-person-fill text-white fs-1"></i>
                    </div>
                    <h5 class="fw-bold mb-0" th:text="${usuarioDTO.email}">usuario@email.com</h5>
                    <small class="text-muted">ID: <span th:text="${usuarioDTO.id}">0</span></small>
                </div>

                <form th:action="@{/usuarios/atualizar/{id}(id=${usuarioDTO.id})}"
                      th:object="${usuarioDTO}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">E-mail</label>
                        <div class="input-group">
                            <input type="email" class="form-control bg-light" th:field="*{email}" readonly>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="novaSenha" class="form-label fw-semibold">Nova Senha</label>
                        <div class="input-group">
                            <input type="password" id="novaSenha" th:field="*{senha}" class="form-control"
                                   placeholder="Deixe em branco para manter a atual">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="endereco" class="form-label fw-semibold">Endereço</label>
                        <div class="input-group">
                            <input type="text" id="endereco" th:field="*{endereco}" class="form-control"
                                   placeholder="Rua, número, bairro, cidade">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success text-white fw-semibold px-4">
                            <i class="bi bi-check-circle me-2"></i>Salvar Alterações
                        </button>
                        <a th:href="@{/}" class="btn btn-outline-secondary px-4">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
