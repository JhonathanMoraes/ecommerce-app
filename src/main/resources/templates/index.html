<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | ECommerce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:if="${session.usuarioLogado == null}" class="bg-dark text-white min-vh-100 d-flex align-items-center justify-content-center">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card bg-secondary text-white border-0 shadow-lg p-5">
                    <div class="card-body">
                        <i class="bi bi-shop mb-3 display-1"></i>
                        <h1 class="fw-bold mb-3">Bem-vindo ao ECommerce</h1>
                        <p class="text-light mb-5 fs-5">
                            Descubra os melhores produtos ou anuncie os seus de forma rápida e segura.
                        </p>
                        <a th:href="@{/login}" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:if="${session.usuarioLogado != null}">
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="bg-dark text-white py-5">
        <div class="container text-center">
            <h1 class="fw-bold display-5"><i class="bi bi-shop me-2"></i>Catálogo de Produtos</h1>
        </div>
    </div>

    <div class="container py-4">

        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show d-flex align-items-center">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${sucesso}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${#lists.isEmpty(produtos)}" class="text-center py-5">
            <i class="bi bi-box-seam text-muted display-1"></i>
            <h4 class="text-muted mt-3">Nenhum produto disponível no momento</h4>
            <a th:href="@{/produtos/novo}" class="btn btn-primary mt-3">
                <i class="bi bi-plus-circle me-2"></i>Anunciar Produto
            </a>
        </div>

        <div class="row g-4" th:unless="${#lists.isEmpty(produtos)}">
            <div class="col-xl-3 col-lg-4 col-md-6" th:each="produto : ${produtos}">
                <a th:href="@{/produtos/{id}(id=${produto.id})}" class="text-decoration-none text-dark">
                    <div class="card h-100 shadow-sm border-0">
                        <img th:src="@{/default_product_img.png}" alt="Imagem do produto" class="card-img-top object-fit-cover" style="height: 200px;">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title fw-bold mb-1" th:text="${produto.nome}">Nome do Produto</h5>
                            <div class="mb-2">
                                <span class="badge bg-warning text-dark">
                                    <i class="bi bi-star-fill me-1"></i>
                                    <span th:text="${produto.nota}">0</span>/10
                                </span>
                            </div>
                            <p class="text-primary fs-5 fw-bold mt-auto mb-0">
                                R$ <span th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">0,00</span>
                            </p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
