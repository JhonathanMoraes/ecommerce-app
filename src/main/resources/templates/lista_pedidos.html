<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos | ECommerce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="bg-dark text-white py-4 mb-4">
    <div class="container">
        <h1 class="fw-bold fs-3 mb-0"><i class="bi bi-bag me-2"></i>Meus Pedidos</h1>
    </div>
</div>

<div class="container py-4">

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show d-flex align-items-center">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(pedidos)}" class="text-center py-5">
        <i class="bi bi-bag-x text-muted" style="font-size: 4rem;"></i>
        <h4 class="text-muted mt-3">Você ainda não tem pedidos</h4>
        <a th:href="@{/}" class="btn btn-primary mt-3">
            <i class="bi bi-shop me-2"></i>Explorar Produtos
        </a>
    </div>

    <div class="card shadow-sm border-0" th:unless="${#lists.isEmpty(pedidos)}">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="py-3 ps-4">#</th>
                        <th class="py-3">Produto</th>
                        <th class="py-3">Quantidade</th>
                        <th class="py-3">Status</th>
                        <th class="py-3">Total</th>
                        <th class="py-3 text-center">Ação</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pedido : ${pedidos}"
                        th:onclick="|window.location.href='@{/pedidos/{id}(id=${pedido.id})}'|">
                        <td class="py-3 ps-4 fw-semibold text-muted" th:text="${pedido.id}">1</td>
                        <td class="py-3 fw-semibold" th:text="${pedido.nomeProduto}">Produto</td>
                        <td class="py-3" th:text="${pedido.quantidade}">1</td>
                        <td class="py-3">
                            <span th:text="${pedido.status}"
                                  th:classappend="${pedido.status == 'PENDENTE'} ? 'bg-warning text-dark' :
                                                  (${pedido.status == 'CANCELADO'} ? 'bg-danger' :
                                                  (${pedido.status == 'ENVIADO'} ? 'bg-success' : 'bg-info'))"
                                  class="badge rounded-pill">PENDENTE</span>
                        </td>
                        <td class="py-3 fw-bold text-primary">
                            R$ <span th:text="${#numbers.formatDecimal(pedido.total, 1, 'POINT', 2, 'COMMA')}">0,00</span>
                        </td>
                        <td class="py-3 text-center">
                            <a th:href="@{/pedidos/{id}(id=${pedido.id})}" class="btn btn-sm btn-outline-primary"
                               onclick="event.stopPropagation()">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
